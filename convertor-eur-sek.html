
<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Convertor EUR în SEK</title>
<meta name="description" content="Convertor valutar simplu din EUR în SEK.">
<style>
body{font-family:Arial;margin:40px;background:#f4f4f4}
.box{background:white;padding:20px;border-radius:10px;max-width:700px;margin:auto;box-shadow:0 0 10px rgba(0,0,0,0.1)}
input,button{padding:8px;margin-top:5px}
.result{margin-top:10px;font-weight:bold}
a{display:block;margin-top:10px}
</style>
</head>
<body>
<div class="box">
<h1>Convertor EUR în SEK</h1>
<p>Convertor valutar simplu din EUR în SEK.</p>
<input id="val" type="number" placeholder="Introdu valoare">
<button onclick="calc()">Calculează</button>
<div class="result" id="rez"></div>
</div>

<script>
function calc(){
let v=document.getElementById("val").value; document.getElementById("rez").innerHTML="Rezultat estimat: "+(v*0.9).toFixed(2);
}
</script>
</body>
</html>
